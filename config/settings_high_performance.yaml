  max_storage_gb: 10000
  raid:
    enabled: true
    hot_spare: true
    level: '6'
    stripe_size: 64K
  storage_policy:
    cold_data_days: 365
    hot_data_days: 7
    warm_data_days: 30
  video_retention_days: 30
system:
  auto_start: true
  log_level: INFO
  name: AI Edge Computing Server
  version: 2.0.0
web:
  alerts:
